<div class="min-h-screen flex flex-col justify-center items-center px-4 bg-[#F9F9F9]">

  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="mb-10 text-center">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-[#FF6B35] mb-4">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="white"/>
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-gray-900 tracking-tight">Marisa Express</h1>
      <p class="text-sm text-gray-500 mt-1">Accedi o crea il tuo account</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

      <h2 class="text-lg font-semibold text-gray-900 mb-1">Inizia da qui</h2>
      <p class="text-sm text-gray-500 mb-6">Inserisci la tua email per continuare</p>

      <!-- Input email -->
      <div class="mb-4">
        <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">
          Email
        </label>
        <input
          type="email"
          [(ngModel)]="email"
          (keyup.enter)="continua()"
          placeholder="nome@esempio.com"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-900
                 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#FF6B35]
                 focus:border-transparent transition"
        />
      </div>

      <!-- Errore -->
      <div *ngIf="error" class="mb-4 text-xs text-red-500 bg-red-50 rounded-lg px-3 py-2">
        {{ error }}
      </div>

      <!-- Bottone continua -->
      <button
        (click)="continua()"
        [disabled]="loading"
        class="w-full py-3 rounded-xl bg-[#FF6B35] text-white text-sm font-semibold
               hover:bg-[#E5521C] active:scale-95 transition-all duration-150
               disabled:opacity-60 disabled:cursor-not-allowed"
      >
        <span *ngIf="!loading">Continua</span>
        <span *ngIf="loading" class="flex items-center justify-center gap-2">
          <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          Attendere...
        </span>
      </button>

      <!-- Divider -->
      <div class="flex items-center my-5">
        <div class="flex-1 h-px bg-gray-100"></div>
        <span class="px-3 text-xs text-gray-400">oppure</span>
        <div class="flex-1 h-px bg-gray-100"></div>
      </div>

      <!-- Google OAuth placeholder -->
      <button
        class="w-full py-3 rounded-xl border border-gray-200 text-sm font-medium text-gray-700
               hover:bg-gray-50 active:scale-95 transition-all duration-150 flex items-center justify-center gap-3"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continua con Google
      </button>

    </div>

    <!-- Link registrazione altri tipi -->
    <div class="mt-6 text-center space-y-2">
      <p class="text-xs text-gray-400">Vuoi unirti come</p>
      <div class="flex justify-center gap-4">
        <button
          (click)="goToRider()"
          class="text-xs text-[#FF6B35] font-medium hover:underline"
        >
          Rider
        </button>
        <span class="text-gray-300 text-xs">|</span>
        <button
          (click)="goToRistoratore()"
          class="text-xs text-[#FF6B35] font-medium hover:underline"
        >
          Ristoratore
        </button>
      </div>
    </div>

  </div>
</div>
