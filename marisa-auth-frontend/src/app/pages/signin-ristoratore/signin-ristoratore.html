<div class="min-h-screen flex flex-col justify-center items-center px-4 py-10 bg-[#F9F9F9]">

  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="mb-8 text-center">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-[#FF6B35] mb-4">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="white"/>
        </svg>
      </div>
      <h1 class="text-2xl font-semibold text-gray-900 tracking-tight">Marisa Express</h1>
      <p class="text-sm text-gray-500 mt-1">Porta il tuo ristorante online</p>
    </div>

    <!-- Badge ruolo -->
    <div class="flex justify-center mb-6">
      <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-orange-50
                   border border-orange-100 text-xs font-medium text-[#FF6B35]">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.6 6.62c-1.44 0-2.8.56-3.77 1.53L12 10.66 10.48 12h.01L7.8 14.39c-.64.64-1.49.99-2.4.99-1.87 0-3.39-1.52-3.39-3.4S3.53 8.6 5.4 8.6c.91 0 1.76.35 2.44 1.03l1.13 1 1.51-1.34L9.22 8.2C8.2 7.18 6.84 6.62 5.4 6.62 2.42 6.62 0 9.04 0 12s2.42 5.38 5.4 5.38c1.44 0 2.8-.56 3.77-1.53l2.83-2.5.01.01L13.52 12h-.01l2.69-2.39c.64-.64 1.49-.99 2.4-.99 1.87 0 3.39 1.52 3.39 3.4s-1.52 3.38-3.39 3.38c-.9 0-1.76-.35-2.44-1.03l-1.14-1.01-1.51 1.34 1.27 1.12c1.02 1.01 2.37 1.57 3.82 1.57 2.98 0 5.4-2.41 5.4-5.38s-2.42-5.37-5.4-5.37z"/>
        </svg>
        Registrazione Ristoratore
      </span>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

      <!-- Sezione dati personali -->
      <div class="mb-6">
        <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">
          Dati personali
        </h2>

        <!-- Nome -->
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">
            Nome completo <span class="text-[#FF6B35]">*</span>
          </label>
          <input
            type="text"
            [(ngModel)]="nome"
            placeholder="Giuseppe Verdi"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-900
                   placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#FF6B35]
                   focus:border-transparent transition"
          />
        </div>

        <!-- Email -->
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">
            Email <span class="text-[#FF6B35]">*</span>
          </label>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="nome@esempio.com"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-900
                   placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#FF6B35]
                   focus:border-transparent transition"
          />
        </div>

        <!-- Telefono personale -->
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">
            Telefono
          </label>
          <input
            type="tel"
            [(ngModel)]="telefono"
            placeholder="333 1234567"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-900
                   placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#FF6B35]
                   focus:border-transparent transition"
          />
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">
            Password <span class="text-[#FF6B35]">*</span>
          </label>
          <div class="relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password"
              placeholder="Minimo 6 caratteri"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-900
                     placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#FF6B35]
                     focus:border-transparent transition pr-12"
            />
            <button
              type="button"
              (click)="showPassword = !showPassword"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
            >
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Conferma password -->
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">
            Conferma password <span class="text-[#FF6B35]">*</span>
          </label>
          <input
            type="password"
            [(ngModel)]="confermaPassword"
            placeholder="Ripeti la password"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-900
                   placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#FF6B35]
                   focus:border-transparent transition"
          />
        </div>
      </div>

      <!-- Divisore -->
      <div class="h-px bg-gray-100 mb-6"></div>

      <!-- Sezione dati ristorante -->
      <div class="mb-6">
        <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-4">
          Il tuo ristorante
        </h2>

        <!-- Nome ristorante -->
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">
            Nome ristorante <span class="text-[#FF6B35]">*</span>
          </label>
          <input
            type="text"
            [(ngModel)]="nomeRistorante"
            placeholder="Trattoria da Giuseppe"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-900
                   placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#FF6B35]
                   focus:border-transparent transition"
          />
        </div>

        <!-- Via -->
        <div class="mb-4 relative">
          <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">
            Indirizzo <span class="text-[#FF6B35]">*</span>
          </label>
          <div class="relative">
            <input
              type="text"
              [(ngModel)]="via"
              (input)="onViaInput()"
              (blur)="chiudiSuggerimenti()"
              autocomplete="off"
              placeholder="Es. Via Roma 1, Milano"
              class="w-full px-4 py-3 rounded-xl border text-sm text-gray-900
                     placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#FF6B35]
                     focus:border-transparent transition pr-10"
              [class.border-green-400]="lat !== null"
              [class.border-gray-200]="lat === null"
            />
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs">
              <span *ngIf="lat !== null" class="text-green-500 font-bold">✓</span>
            </span>
          </div>
          <p *ngIf="lat !== null" class="text-xs text-green-600 mt-1">📍 Indirizzo verificato</p>
          <!-- Suggerimenti -->
          <div *ngIf="mostraSuggerimenti && suggerimenti.length > 0"
               class="absolute z-50 left-0 right-0 bg-white rounded-xl shadow-lg border border-gray-100 mt-1 overflow-hidden">
            <div *ngFor="let s of suggerimenti"
                 (mousedown)="seleziona(s)"
                 class="flex items-start gap-2 px-4 py-3 cursor-pointer hover:bg-orange-50
                        border-b border-gray-50 last:border-b-0 transition">
              <svg class="mt-0.5 flex-shrink-0" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FF6B35" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
              <div class="min-w-0">
                <p class="text-sm font-semibold text-gray-900 truncate">{{ s.shortName }}</p>
                <p class="text-xs text-gray-400 truncate">{{ s.displayName }}</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Telefono ristorante -->
        <div class="mb-4">
          <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">
            Telefono ristorante
          </label>
          <input
            type="tel"
            [(ngModel)]="telefonoRistorante"
            placeholder="02 1234567"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-900
                   placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#FF6B35]
                   focus:border-transparent transition"
          />
        </div>

        <!-- Partita IVA -->
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wide">
            Partita IVA
          </label>
          <input
            type="text"
            [(ngModel)]="partitaIva"
            placeholder="12345678901"
            maxlength="11"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm text-gray-900
                   placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#FF6B35]
                   focus:border-transparent transition"
          />
        </div>
      </div>

      <!-- Errore -->
      <div *ngIf="error" class="mb-4 text-xs text-red-500 bg-red-50 rounded-lg px-3 py-2">
        {{ error }}
      </div>

      <!-- Bottone -->
      <button
        (click)="registrati()"
        [disabled]="loading"
        class="w-full py-3 rounded-xl bg-[#FF6B35] text-white text-sm font-semibold
               hover:bg-[#E5521C] active:scale-95 transition-all duration-150
               disabled:opacity-60 disabled:cursor-not-allowed"
      >
        <span *ngIf="!loading">Registra il ristorante</span>
        <span *ngIf="loading" class="flex items-center justify-center gap-2">
          <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          Attendere...
        </span>
      </button>

    </div>

    <!-- Torna indietro -->
    <div class="mt-6 text-center">
      <button (click)="torna()" class="text-xs text-gray-400 hover:text-gray-600 transition">
        Hai già un account? Accedi
      </button>
    </div>

  </div>
</div>
